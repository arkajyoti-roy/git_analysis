    <h2>Welcome, {{ userName }}</h2>
    <p class="role-badge" [class.sr-badge]="isSrDev">{{ isSrDev ? 'Senior Developer' : 'Developer' }}</p>
  </div>

  <div class="dashboard-grid">

    <!-- COMMON WIDGET: Active Repositories -->
    <div class="dashboard-card">
      <h3>Active Repositories</h3>
      <div class="list-group">
        @for(repo of activeRepos; track repo.id) {
          <a [routerLink]="['/developer/repositories', repo.id]" class="list-item clickable">
            <span class="item-title">{{ repo.name }}</span>
            <span class="text-muted">Branch: {{ repo.branch }} • Status: {{ repo.status }}</span>
          </a>
        } @empty {
          <p class="empty-state">No active repositories.</p>
        }
      </div>
    </div>
