<div class="login-container">
  <div class="login-card">

    <div class="login-brand">
      <div class="login-brand-icon" style="background: transparent; width: 48px; height: 48px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #2563eb;">
          <circle cx="12" cy="12" r="10"/>
          <path d="M14.31 8l5.74 9.94M9.69 8h11.48M7.38 12l5.74-9.94M9.69 16l-5.74-9.94M14.31 16H2.83M16.62 12l-5.74 9.94"/>
          <circle cx="12" cy="12" r="4.5" fill="var(--bg-surface, #ffffff)" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10.5 10.5L9 12l1.5 1.5M13.5 10.5L15 12l-1.5 1.5M12.75 9.75l-1.5 4.5" stroke-width="1.2"/>
        </svg>
      </div>
      <h2 style="font-family: 'Audiowide', 'Michroma', 'Orbitron', sans-serif; font-weight: 400; letter-spacing: 0.5px; color: #2563eb;">RepoLens</h2>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="name@company.com"
          required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required>
        <div class="forgot-password-link">
          <a routerLink="/auth/forgot-password" style="font-size: 13px; color: var(--primary-color, #4f46e5); text-decoration: none; margin-top: 8px; display: inline-block;">Forgot password?</a>
        </div>
      </div>

      <button type="submit">
        Sign In
      </button>

    </form>

  </div>
</div>
