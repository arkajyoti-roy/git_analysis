<div class="forgot-container">
  <div class="forgot-card">
    
    <div class="forgot-brand">
      <div class="forgot-brand-icon" style="background: transparent; width: 48px; height: 48px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #2563eb;">
          <circle cx="12" cy="12" r="10"/>
          <path d="M14.31 8l5.74 9.94M9.69 8h11.48M7.38 12l5.74-9.94M9.69 16l-5.74-9.94M14.31 16H2.83M16.62 12l-5.74 9.94"/>
          <circle cx="12" cy="12" r="4.5" fill="var(--bg-surface, #ffffff)" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10.5 10.5L9 12l1.5 1.5M13.5 10.5L15 12l-1.5 1.5M12.75 9.75l-1.5 4.5" stroke-width="1.2"/>
        </svg>
      </div>
      <h2>Reset Password</h2>
      <p class="subtitle" *ngIf="step === 'email'">Enter your email to receive an OTP</p>
      <p class="subtitle" *ngIf="step === 'otp'">Enter the 6-digit code sent to your email</p>
      <p class="subtitle" *ngIf="step === 'password'">Set your new password</p>
    </div>

    <!-- Step 1: Email -->
    <form *ngIf="step === 'email'" (ngSubmit)="sendOtp()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="name@company.com" required>
      </div>
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'Send OTP' }}
      </button>
      <div class="back-link">
        <a routerLink="/auth/login">Back to Login</a>
      </div>
    </form>

    <!-- Step 2: OTP -->
    <form *ngIf="step === 'otp'" (ngSubmit)="verifyOtp()">
      <div class="form-group">
        <label>Enter OTP</label>
        <input type="text" [(ngModel)]="otp" name="otp" placeholder="123456" maxlength="6" required>
      </div>
      <button type="submit">Verify OTP</button>
      <div class="back-link">
        <a (click)="step = 'email'" style="cursor:pointer">Change Email</a>
      </div>
    </form>

    <!-- Step 3: New Password -->
    <form *ngIf="step === 'password'" (ngSubmit)="resetPassword()">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Minimum 8 characters" required>
      </div>
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

  </div>
</div>
