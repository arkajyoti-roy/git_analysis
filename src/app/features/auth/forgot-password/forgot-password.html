<div class="forgot-container">
  <div class="forgot-card">
    
    <div class="forgot-brand">
      <div class="forgot-brand-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
        </svg>
      </div>
      <h2>Reset Password</h2>
      <p class="subtitle" *ngIf="step === 'email'">Enter your email to receive an OTP</p>
      <p class="subtitle" *ngIf="step === 'otp'">Enter the 6-digit code sent to your email</p>
      <p class="subtitle" *ngIf="step === 'password'">Set your new password</p>
    </div>

    <!-- Step 1: Email -->
    <form *ngIf="step === 'email'" (ngSubmit)="sendOtp()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="name@company.com" required>
      </div>
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'Send OTP' }}
      </button>
      <div class="back-link">
        <a routerLink="/auth/login">Back to Login</a>
      </div>
    </form>

    <!-- Step 2: OTP -->
    <form *ngIf="step === 'otp'" (ngSubmit)="verifyOtp()">
      <div class="form-group">
        <label>Enter OTP</label>
        <input type="text" [(ngModel)]="otp" name="otp" placeholder="123456" maxlength="6" required>
      </div>
      <button type="submit">Verify OTP</button>
      <div class="back-link">
        <a (click)="step = 'email'" style="cursor:pointer">Change Email</a>
      </div>
    </form>

    <!-- Step 3: New Password -->
    <form *ngIf="step === 'password'" (ngSubmit)="resetPassword()">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="Minimum 8 characters" required>
      </div>
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

  </div>
</div>
