<div class="cp-wrapper">
  <div class="cp-card">
    <div class="cp-header">
      <h1>Complete Your Profile</h1>
      <p>Please fill in your missing details to access the dashboard</p>
    </div>

    <form (ngSubmit)="saveProfile()">
      <!-- Account Info (Readonly) -->
      <h3 class="cp-section-title">Account Information</h3>
      <div class="cp-grid">
        <div class="cp-form-group">
          <label>Employee ID</label>
          <input type="text" class="cp-input" [value]="emp_id" disabled>
        </div>
        <div class="cp-form-group">
          <label>Full Name</label>
          <input type="text" class="cp-input" [value]="emp_name" disabled>
        </div>
        <div class="cp-form-group">
          <label>Email Address</label>
          <input type="email" class="cp-input" [value]="emp_email" disabled>
        </div>
      </div>

      <div class="cp-divider"></div>

      <!-- Additional Details -->
      <h3 class="cp-section-title">Additional Details</h3>
      <div class="cp-grid">
        
        <div class="cp-form-group">
          <label>Phone Number <span class="required">*</span></label>
          <input type="text" class="cp-input" placeholder="e.g. +1234567890" name="phone" [(ngModel)]="emp_phone" required>
        </div>
        
        <div class="cp-form-group">
          <label>Address <span class="required">*</span></label>
          <input type="text" class="cp-input" placeholder="e.g. 123 Main St" name="address" [(ngModel)]="emp_address" required>
        </div>

        <div class="cp-form-group">
          <label>Blood Group</label>
          <select class="cp-input" name="blood_group" [(ngModel)]="emp_blood_group">
            <option value="" disabled selected>Select Blood Group</option>
            <option *ngFor="let bg of bloodGroups" [value]="bg">{{ bg }}</option>
          </select>
        </div>

        <div class="cp-form-group">
          <label>Date of Joining</label>
          <input type="date" class="cp-input" name="doj" [(ngModel)]="emp_doj">
        </div>

        <div class="cp-form-group">
          <label>Tenure (in months)</label>
          <input type="number" class="cp-input" placeholder="e.g. 12" name="tenure" [(ngModel)]="emp_tenure">
        </div>

        <div class="cp-form-group">
          <label>Position</label>
          <input type="text" class="cp-input" placeholder="e.g. Lead Developer" name="position" [(ngModel)]="emp_position">
        </div>

        <div class="cp-form-group">
          <label>Graduation Year</label>
          <input type="number" class="cp-input" placeholder="e.g. 2024" name="grad" [(ngModel)]="emp_grad">
        </div>

        <div class="cp-form-group">
          <label>Marital Status</label>
          <select class="cp-input" name="m_status" [(ngModel)]="emp_m_status">
            <option value="" disabled selected>Select Status</option>
            <option *ngFor="let status of maritalStatuses" [value]="status">{{ status }}</option>
          </select>
        </div>

        <div class="cp-form-group">
          <label>Work Field</label>
          <input type="text" class="cp-input" placeholder="e.g. Backend" name="work_field" [(ngModel)]="emp_work_field">
        </div>

      </div>

      <div class="cp-divider"></div>

      <div class="cp-footer">
        <button type="submit" class="cp-btn-submit" [ngClass]="{'active': emp_phone && emp_address && !isLoading}" [disabled]="!emp_phone || !emp_address || isLoading">
          {{ isLoading ? 'Saving...' : 'Save & Continue' }}
        </button>
      </div>

    </form>
  </div>
</div>
