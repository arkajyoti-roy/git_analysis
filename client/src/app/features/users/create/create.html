<div class="create-user-container">

  <h2>Create User</h2>

  <div class="form-card">

    <input type="text" placeholder="Full Name" [(ngModel)]="emp_name" required>

    <input type="email" placeholder="Email" [(ngModel)]="emp_email" required>

    <input type="password" placeholder="Password" [(ngModel)]="emp_pass"  required>

    <select [(ngModel)]="emp_role" required>
      <option disabled>Select</option>
      <option value="admin">
        Admin
      </option>

      <option value="sr-dev">
        Senior Developer
      </option>

      <option value="jr-dev">
        Junior Developer
      </option>

    </select>

    <button (click)="createUser()" [disabled]="isLoading">

      {{ isLoading ? 'Creating...' : 'Create User' }}

    </button>

  </div>

</div>
