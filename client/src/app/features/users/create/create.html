<div class="create-user-container">

  <h2>Create User</h2>

  <div class="form-card">
    <label>Name</label>
    <input style="margin-top: -15px;" type="text" placeholder="Full Name" [(ngModel)]="emp_name" required>
    <label>Email</label>
    <input style="margin-top: -15px;" type="email" placeholder="Email" [(ngModel)]="emp_email" required>
    <label>Password</label>
    <input style="margin-top: -15px;" type="password" placeholder="Password" [(ngModel)]="emp_pass" required>
    <label>Select Role</label>
    <select style="margin-top: -15px;" [(ngModel)]="emp_role" required>
      <option value="" disabled selected>Select</option>
      <option value="admin" selected>
        Admin
      </option>

      <option value="sr-dev">
        Senior Developer
      </option>

      <option value="jr-dev">
        Junior Developer
      </option>

    </select>

    <button (click)="createUser()" [disabled]="isLoading">

      {{ isLoading ? 'Creating...' : 'Create User' }}

    </button>

  </div>

</div>
