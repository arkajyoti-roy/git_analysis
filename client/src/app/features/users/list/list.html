<app-create></app-create>
<h2>Manage Users</h2>

@if (isLoading) {
<p>Loading users...</p>
} @else {
<table>

  <thead >
    <tr>
      <th style="text-align: center;" >ID</th>
      <th style="text-align: center;">Name</th>
      <th style="text-align: center;">Email</th>
      <th style="text-align: center;">Role</th>
      <th style="text-align: center;">Action</th>
    </tr>
  </thead>

  <tbody>

    @for(user of users; track user.emp_id || user.id || $index){

    <tr>
      <td style="text-align: center;">{{user.emp_id || user.id}}</td>
      <td style="text-align: center;">{{ user.emp_name || user.name }}</td>
      <td style="text-align: center;">{{ user.emp_email || user.email }}</td>
      <td style="text-align: center;">{{ user.emp_role || user.role }}</td>

      <td style="text-align: center; display: flex; gap: 15px;">
        <button style="align-items: center; text-align: center;">Edit</button>
        <button style="align-items: center; text-align: center;">Delete</button>
      </td>

    </tr>

    }

  </tbody>

</table>
}
