<div class="login-container">
  <div class="login-card">

    <div class="login-brand">
      <div class="login-brand-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
        </svg>
      </div>
      <h2>RepoLens</h2>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="name@company.com"
          required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required>
      </div>

      <button type="submit">
        Sign In
      </button>

    </form>

  </div>
</div>
