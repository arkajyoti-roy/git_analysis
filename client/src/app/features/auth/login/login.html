<div class="login-container">

  <div class="login-card">

    <h2>RepoLens</h2>
    <p>Repository Documentation Portal</p>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter Email"
          required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter Password"
          required>
      </div>

      <button type="submit">
        Login
      </button>

    </form>

  </div>

</div>
