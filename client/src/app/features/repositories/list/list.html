<div class="section-header">
  <h2 style="margin: 0; font-size: 1.5rem; font-weight: 600;">Manage Repositories</h2>
  <button routerLink="/admin/repositories/create">Add Repository</button>
</div>

@if (isLoading) {
  <p>Loading repositories...</p>
} @else {
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Stack</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for(repo of repositories; track repo.id) {
        <tr>
          <td>{{ repo.id }}</td>
          <td>{{ repo.repo_name }}</td>
          <td>{{ repo.repo_stack }}</td>
          <td>
            <span class="status-badge" [class.completed]="repo.repo_status === 'completed'">{{ repo.repo_status }}</span>
          </td>
          <td>
            <div style="display: flex; justify-content: center; gap: 0.5rem;">
              <button [routerLink]="['/admin/repositories', repo.id]" class="btn-sm">View</button>
              <button [routerLink]="['/admin/repositories', repo.id, 'edit']" class="btn-sm" style="background: #f59e0b; border-color: #f59e0b; color: #000;">Edit</button>
              <button (click)="deleteRepo(repo.id)" class="btn-sm" style="background: #ef4444; border-color: #ef4444; color: white;">Delete</button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" style="text-align: center; color: var(--text-muted);">No repositories found. Create one!</td>
        </tr>
      }
    </tbody>
  </table>
}
