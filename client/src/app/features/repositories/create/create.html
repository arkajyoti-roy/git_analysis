<div class="create-repo-container">
  
  <h2 style="margin-bottom: 2rem;">Create Repository</h2>

  <div class="form-card">
    
    <div class="form-group">
      <label>Repository Name</label>
      <input type="text" placeholder="e.g. My Awesome Project">
    </div>

    <div class="form-group">
      <label>GitHub URL</label>
      <input type="text" placeholder="https://github.com/...">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea placeholder="Brief description of the repository..." rows="4"></textarea>
    </div>

    <button>Create Repository</button>
    
  </div>

</div>
